short_bio: >-
  Tenghui's research focuses on developing efficient and accurate computational methods 
  for modeling strongly correlated systems and nonadiabatic processes in extended systems. 
  He received his B.S. in 2021 from Zhejiang University under the supervision of Prof. Linjun Wang,
  where he worked on time-dependent variational approaches based on surface-hopping trajectories.
  He earned his Ph.D. in 2026 from Zhejiang University, also under the supervision of Prof. Linjun Wang.
  His doctoral research focuses on computational spectroscopy, machine-learning electronic Hamiltonians, 
  and nonadiabatic dynamics in extended systems, particularly semiconductor quantum dots. 
  He is currently a postdoctoral researcher in the Sun lab at Rutgers University-New Brunswick,
  where he develpes computational approaches for strongly correlated systems,
  while exploring how artifical intelligence and machine learning can accezlerate scientific discovery.

