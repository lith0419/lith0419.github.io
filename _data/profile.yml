short_bio: >-
  Tenghui's research focuses on electronic structure theory and mixed quantum-classical dynamics. 
  His work aims to develop efficient and accurate methods for predicting spectroscopic 
  properties and simulating nonadiabatic processes in complex systems. Tenghui received 
  his B.S. from Zhejiang University in 2021 under the supervision of Prof. Linjun Wang,
  where he worked on time-dependent variational approaches based on surface-hopping trajectories.
  He also completed a minor in Chinese Language and Literature. Tenghui is currently pursuing a Ph.D. at Zhejiang University under Prof. Linjun Wang. 
  His current research focuses on the development of algorithms for computational spectroscopy, machine-learning approaches
  to electronic Hamiltonians, and nonadiabatic dynamics simulations in quantum dots.

